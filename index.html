<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Art Site</title>

<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Code&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<!-- ENTER -->
<div id="tap-overlay">
    <h1>enter</h1>
</div>

<!-- BACKGROUND VIDEO -->
<video id="bg-video" autoplay muted playsinline loop>
    <source src="assets/video/unfazed.mp4" type="video/mp4">
</video>

<!-- LOGO -->
<img id="main-logo" src="assets/images/littlelogo.png">

<!-- GALLERY -->
<div id="image-gallery">

    <img src="assets/images/uzifront.png" onclick="showProduct('uzi')">
    <img src="assets/images/uziback.png" onclick="showProduct('uzi')">

    <img src="assets/images/culturefront.png" onclick="showProduct('culture')">
    <img src="assets/images/cultureback.png" onclick="showProduct('culture')">

    <img src="assets/images/ccfront.png" onclick="showProduct('cc')">
    <img src="assets/images/ccback.png" onclick="showProduct('cc')">

</div>

<!-- PRODUCT VIEW -->
<div id="product-view">

    <button id="back-btn" onclick="hideProduct()">← back</button>

    <div class="product-layout">

        <div class="product-images">
            <img id="pimg1">
            <img id="pimg2">
        </div>

        <div class="product-info">
            <h1 id="ptitle"></h1>
            <p id="pdesc"></p>
        </div>

    </div>
</div>

<script src="assets/js/script.js"></script>
</body>
</html>
